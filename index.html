<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Service NSW</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #111; color: #fff; height: 100vh; overflow: hidden; }

  /* SCREENS */
  .screen { display: none; width: 100%; height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* LOGIN */
  .login-top { flex: 1; display: flex; flex-direction: column; align-items: center; }
  .logo-row { display: flex; align-items: center; justify-content: center; gap: 0.4rem; padding: 1.5rem 1rem .5rem; }
  .logo-row img:first-child { height: 5rem; }
  .logo-row img:last-child { height: 4rem; }
  .warning { display: flex; justify-content: center; padding: 0 1rem; }
  .warning img.banner { width: 100%; max-width: 420px; display: block; }
  .pin-title { margin-top: 2rem; font-size: 1.5rem; font-weight: 700; text-align: center; }
  .pin-dots { display: flex; gap: 1.2rem; margin: 1.5rem 0 1rem; }
  .dot { width: 3.6rem; height: 3.6rem; border: 1.5px solid #3a3a3a; border-radius: 50%; background: #3a3a3a; transition: background .1s, border-color .1s; position: relative; }
  .dot.filled { background: #666; border-color: #666; }
  .dot.filled::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border-radius: 50%; background: #aaa; }
  .dot.active { background: transparent; border: 1.5px solid #ffffff; }
  .reset-link { color: #a0ccff; text-decoration: underline; font-size: 1rem; cursor: pointer; margin-bottom: 1.5rem; }

  /* hidden input to trigger native keyboard */
  #pin-input { position: fixed; opacity: 0; width: 100%; height: 100%; top: 0; left: 0; z-index: 0; caret-color: transparent; border: none; background: transparent; color: transparent; font-size: 16px; }

  /* HOME / SCROLLABLE SCREENS */
  .screen-top { flex-shrink: 0; width: 100%; }
  .screen-top img { width: 100%; display: block; }
  .screen-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .screen-scroll img { width: 100%; display: block; }
  .scroll-img-wrap { position: relative; }
  .scroll-img-wrap img { width: 100%; display: block; }
  .card-hotspot { position: absolute; top: 52%; left: 17%; width: 68%; height: 22%; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .screen-bottom { flex-shrink: 0; width: 100%; position: relative; }
  .screen-bottom img { width: 100%; display: block; }
  .nav-hotspots { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; }
  .hotspot { flex: 1; height: 100%; cursor: pointer; -webkit-tap-highlight-color: transparent; }

  /* LICENCE SCREEN */
  #licence-screen { background: #000; }

  /* SCREENSHOT SCREENS (legacy single-image screens) */
  .screenshot-screen { position: relative; width: 100%; height: 100vh; overflow-y: auto; }
  .screenshot-screen img.bg { width: 100%; display: block; }

  /* legacy classes kept so nothing breaks */
  .container { display:flex; flex-direction:column; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="screen active">
  <div class="login-top">
    <div class="logo-row">
      <img src="nsw-logo.png" alt="NSW">
      <img src="service-nsw.png" alt="Service NSW">
    </div>
    <div class="warning">
      <img class="banner" src="banner.png" alt="Rego checks warning">
    </div>
    <div class="pin-title">Log in with PIN</div>
    <div class="pin-dots" id="pin-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <span class="reset-link">Reset PIN with email and password</span>
  </div>
  <input id="pin-input" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off" autocorrect="off">
</div>

<!-- HOME SCREEN -->
<div id="home-screen" class="screen">
  <div class="screen-top">
    <img src="home-top.png" alt="">
  </div>
  <div class="screen-scroll">
    <div class="scroll-img-wrap">
      <img src="home-scroll-1.png" alt="">
      <div class="card-hotspot" onclick="showScreen('licence-screen')"></div>
    </div>
    <img src="home-scroll-2.png" alt="">
  </div>
  <div class="screen-bottom">
    <img src="home-nav.png" alt="">
    <div class="nav-hotspots">
      <div class="hotspot" onclick="showScreen('home-screen')"></div>
      <div class="hotspot" onclick="showScreen('services-screen')"></div>
      <div class="hotspot" onclick="showScreen('wallet-screen')"></div>
    </div>
  </div>
</div>

<!-- LICENCE SCREEN — black placeholder, replace with images later -->
<div id="licence-screen" class="screen">
  <div style="padding: 1.5rem; display: flex; align-items: center; gap: 1rem;">
    <span onclick="showScreen('home-screen')" style="font-size: 1.5rem; cursor: pointer;">&#8592;</span>
    <span style="font-size: 1.1rem; font-weight: 600;">Provisional Driver Licence</span>
  </div>
</div>

<!-- SERVICES SCREEN
<div id="services-screen" class="screen">
  <div class="screenshot-screen">
    <img class="bg" src="services.png" alt="Services">
  </div>
  <div class="nav-hotspots">
    <div class="hotspot" onclick="showScreen('home-screen')"></div>
    <div class="hotspot" onclick="showScreen('services-screen')"></div>
    <div class="hotspot" onclick="showScreen('wallet-screen')"></div>
  </div>
</div>

<!-- WALLET SCREEN — drop wallet.png in the same folder -->
<div id="wallet-screen" class="screen">
  <div class="screenshot-screen">
    <img class="bg" src="wallet.png" alt="Wallet">
  </div>
  <div class="nav-hotspots">
    <div class="hotspot" onclick="showScreen('home-screen')"></div>
    <div class="hotspot" onclick="showScreen('services-screen')"></div>
    <div class="hotspot" onclick="showScreen('wallet-screen')"></div>
  </div>
</div>

<script>
  const CORRECT_PIN = '1234';
  let pin = '';
  const dots = document.querySelectorAll('.dot');

  const pinInput = document.getElementById('pin-input');

  function focusPinInput() { pinInput.focus(); }

  function updateDots() {
    dots.forEach((d, i) => {
      d.classList.toggle('filled', i < pin.length);
      d.classList.toggle('active', i === pin.length && pin.length < 4);
    });
  }

  function checkPin() {
    if (pin === CORRECT_PIN) {
      showScreen('home-screen');
    } else {
      dots.forEach(d => { d.style.borderColor='#c0392b'; d.style.background='#c0392b'; });
      setTimeout(() => {
        pin = '';
        pinInput.value = '';
        updateDots();
        dots.forEach(d => { d.style.borderColor=''; d.style.background=''; });
        focusPinInput();
      }, 600);
    }
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  pinInput.addEventListener('input', () => {
    pin = pinInput.value.replace(/\D/g, '').slice(0, 4);
    pinInput.value = pin;
    updateDots();
    if (pin.length === 4) setTimeout(checkPin, 250);
  });

  document.getElementById('login-screen').addEventListener('click', focusPinInput);
  updateDots();
  focusPinInput();
</script>
</body>
</html>
