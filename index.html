<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PWA PIN Login</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">
<style>
  body { margin:0; font-family:system-ui, -apple-system, sans-serif; background:#181818; color:#fff; }
  .container { display:flex; flex-direction:column; height:100vh; justify-content:flex-start; }
  .header { text-align:center; padding:1rem; }
  .logo { display:flex; justify-content:center; gap:1.5rem; }
  .logo img { height:3.5rem; }
  .warning {
    display:flex; align-items:center; gap:.7rem;
    background:#a33a00; color:#fff;
    padding:.9rem 1rem .9rem .9rem;
    margin:1.2rem auto 0 auto;
    border-radius:.7rem;
    font-size:1.05rem;
    max-width:95vw;
    box-shadow:0 2px 8px #0002;
    font-weight:500;
  }
  .warning-icon {
    font-size:1.3rem; color:#ffb300; flex-shrink:0;
  }
  .prompt { text-align:center; margin-top:2.5rem; font-size:1.7rem; font-weight:600; }
  .circles { display:flex; justify-content:center; gap:1.5rem; margin:2rem 0 1.2rem 0; }
  .circle { width:2.5rem; height:2.5rem; border:3px solid #666; border-radius:50%; }
  .circle.filled { background:#555; }
  .reset-link-wrap { text-align:center; margin-bottom:1.5rem; }
  .link { color:#0af; text-decoration:underline; cursor:pointer; font-size:1.1rem; }
  .keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:.4rem; padding:0 1.5rem 0.5rem; margin-top:.5rem; transition:opacity .2s; }
  .key { width:80px; height:54px; border-radius:1.5rem; background:#232323; color:#fff; font-size:1.5rem; border:none; display:flex; align-items:center; justify-content:center; margin:0 auto; box-shadow:0 1px 4px #0002; }
  .key:active { background:#333; }
  .keypad.hide { opacity:0; pointer-events:none; height:0; }
</style>
</head>
<body>
<div class="container">
  <div>
    <div class="header">
      <div class="logo">
        <img src="nsw-logo.png" alt="NSW">
        <img src="service-nsw.png" alt="Service NSW">
      </div>
      <div class="warning"><span class="warning-icon">&#9888;</span> Rego checks may be not be available from 5am on Sun 15 Mar to 8:30am on Sun 15 Mar.</div>
      <div class="prompt">Log in with PIN</div>
    </div>
    <div class="circles" id="pin-indicators">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>
    <div class="reset-link-wrap">
      <span class="link" id="reset-link">Reset PIN with email and password</span>
    </div>
  </div>
  <div class="keypad" id="keypad">
    <button class="key" data-key="1">1</button>
    <button class="key" data-key="2">2</button>
    <button class="key" data-key="3">3</button>
    <button class="key" data-key="4">4</button>
    <button class="key" data-key="5">5</button>
    <button class="key" data-key="6">6</button>
    <button class="key" data-key="7">7</button>
    <button class="key" data-key="8">8</button>
    <button class="key" data-key="9">9</button>
    <div></div>
    <button class="key" data-key="0">0</button>
    <button class="key" id="backspace">⌫</button>
  </div>
  <div class="footer">
    <!-- ...existing code... -->
  </div>
</div>
<script>
  const indicators = document.querySelectorAll('.circle');
  let pin = '';
  const correctPin = '1234'; // placeholder
  const keypad = document.getElementById('keypad');
  let keypadVisible = true;

  function updateIndicators() {
    indicators.forEach((c,i)=>{
      c.classList.toggle('filled', i < pin.length);
    });
  }

  function pressKey(k) {
    if (pin.length >= 4) return;
    pin += k;
    updateIndicators();
    if (pin.length === 4) {
      setTimeout(checkPin, 300);
    }
  }

  function checkPin() {
    if (pin === correctPin) {
      alert('Logged in!');
      // navigate or show next screen
    } else {
      alert('Incorrect PIN');
      pin = '';
      updateIndicators();
    }
  }

  document.querySelectorAll('.key').forEach(btn=>{
    btn.addEventListener('click',()=> pressKey(btn.dataset.key));
  });
  document.getElementById('backspace').addEventListener('click',()=>{
    pin = pin.slice(0,-1);
    updateIndicators();
  });
  document.getElementById('reset-link').addEventListener('click',()=>{
    alert('Reset flow');
  });

  // Hide keypad and center PIN area if tap outside keypad
  document.body.addEventListener('click', function(e) {
    if (!e.target.closest('.keypad') && !e.target.closest('.circle') && !e.target.closest('#reset-link')) {
      keypad.classList.add('hide');
      document.querySelector('.container > div').style.justifyContent = 'center';
    }
  });
  // Show keypad on load
  window.addEventListener('DOMContentLoaded', ()=>{
    keypad.classList.remove('hide');
    document.querySelector('.container > div').style.justifyContent = '';
  });
</script>
</body>
</html>
